name: P4_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip=23.3.1
  # Core Library
  - numpy>=1.26.4,<2.0.0  # Safer for Scipy 1.12 compatibility
  - pandas>=2.2.2
  - matplotlib=3.9.2
  - bottleneck=1.3.7      
  - scipy=1.12.0          

  # GUI & Viz
  - pyqt=5.15.10
  - pyqtgraph=0.13.7
  - pillow>=10.3.0
  
  # Communication & Scheduling
  - minimalmodbus=2.1.1
  - apscheduler=3.10.4
  - tzlocal=5.2
  - pyserial=3.5
  - tornado=6.4.1
  - pytz=2024.1
  - python-dateutil=2.9.0
  - pip:
      - doepy==0.0.1