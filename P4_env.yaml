name: P4_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip=23.3.1
  # Core Library
  - numpy=2.0.1
  - pandas=2.3.3
  - matplotlib=3.9.2
  - bottleneck=1.4.2
  - numexpr=2.10.1
  - scipy=1.12.3
  
  # GUI & Viz
  - pyqt=5.15.10
  - pyqtgraph=0.13.7
  - pillow=11.1.0
  
  - minimalmodbus=2.1.1
  - apscheduler=3.11.0
  - tzlocal=5.3
  - pyserial=3.5
  - tornado=6.5.1
  - pytz=2025.2
  - python-dateutil=2.9.0
  - pip:
      - doepy==0.0.1