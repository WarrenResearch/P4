name: P3_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  # Core Library
  - numpy=2.0.1
  - pandas=2.3.3
  - matplotlib=3.9.2
  - bottleneck=1.4.2
  - numexpr=2.10.1

  
  # GUI & Viz
  - pyqt=5.15.10
  - pyqtgraph=0.13.7
